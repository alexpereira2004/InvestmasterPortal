
#spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=false

spring.flyway.baseline-on-migrate=false
spring.flyway.enabled=true

server.port=${PORT:12001}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.credentials-file-path=src/main/resources/credenciais/google-sheets-credentials.json

spring.boot.admin.client.url=http://localhost:8081
spring.boot.admin.client.instance.service-base-url=http://localhost:12001
#spring.boot.admin.client.instance.management-base-url=http://localhost:12001/actuator
#spring.boot.admin.client.instance.health-url=http://localhost:12001/actuator/health
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always